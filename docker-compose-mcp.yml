services:
  n8n-mcp:
    image: node:20-alpine
    container_name: n8n-mcp-server
    working_dir: /app
    command: >
      sh -c "npm install -g n8n-mcp && n8n-mcp"
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env.mcp
    environment:
      - MCP_MODE=http
      - USE_FIXED_HTTP=true
      - PORT=3000
      - HOST=0.0.0.0
      - LOG_LEVEL=info
      - TRUST_PROXY=1
    networks:
      - root_default
    restart: unless-stopped

networks:
  root_default:
    external: true
