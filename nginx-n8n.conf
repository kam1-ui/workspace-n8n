# Configuration Nginx pour n8n avec HTTPS
# Ce fichier sera copié dans /etc/nginx/sites-available/

server {
    listen 80;
    listen [::]:80;
    server_name n8n.chnnlcrypto.cloud;

    # Redirection HTTP vers HTTPS (sera activée après obtention du certificat)
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name n8n.chnnlcrypto.cloud;

    # Les certificats SSL seront générés par Certbot
    # ssl_certificate /etc/letsencrypt/live/n8n.chnnlcrypto.cloud/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/n8n.chnnlcrypto.cloud/privkey.pem;

    # Sécurité SSL moderne
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Headers de sécurité
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Logs
    access_log /var/log/nginx/n8n-access.log;
    error_log /var/log/nginx/n8n-error.log;

    # Taille max des uploads (important pour n8n)
    client_max_body_size 50M;

    # Proxy vers n8n
    location / {
        proxy_pass http://127.0.0.1:5678;
        proxy_http_version 1.1;

        # Headers WebSocket (important pour n8n)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Headers standards
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # Timeouts pour les longues requêtes n8n
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
}
